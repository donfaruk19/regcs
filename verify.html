<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="manifest" href="./manifest.json">
    <title>Digital Sentry - Perimeter Access Control</title>
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    <!-- Tailwind CSS for sleek UI styling -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- HTML5-QRCode Library for high-speed camera scanning -->
    <script src="https://unpkg.com/html5-qrcode"></script>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen flex flex-col items-center justify-between p-4 font-mono">

    <!-- Top Branding Header -->
    <header class="w-full max-w-md text-center border-b border-emerald-500/20 pb-4 mt-2">
        <div class="text-xs text-emerald-500 tracking-widest uppercase font-bold animate-pulse">// Perimeter Gate Control //</div>
        <h1 class="text-xl font-black text-white mt-1">DIGITAL SENTRY VERIFIER</h1>
    </header>

    <!-- Main Dynamic Interface Box -->
    <main class="w-full max-w-md bg-slate-900 border border-slate-800 rounded-xl p-6 shadow-2xl my-auto">
        
        <!-- Camera Scanner Viewfinder Frame -->
        <div id="scanner-container" class="relative w-full aspect-square bg-slate-950 rounded-lg overflow-hidden border border-slate-800 flex flex-col items-center justify-center">
            <div id="reader" class="w-full h-full"></div>
            <!-- Tactical scanning crosshairs overlay -->
            <div class="absolute inset-8 border border-emerald-500/10 pointer-events-none flex items-center justify-center">
                <div class="w-8 h-8 border-t-2 border-l-2 border-emerald-500 absolute top-0 left-0"></div>
                <div class="w-8 h-8 border-t-2 border-r-2 border-emerald-500 absolute top-0 right-0"></div>
                <div class="w-8 h-8 border-b-2 border-l-2 border-emerald-500 absolute bottom-0 left-0"></div>
                <div class="w-8 h-8 border-b-2 border-r-2 border-emerald-500 absolute bottom-0 right-0"></div>
            </div>
        </div>

        <!-- System Response State Panels -->
        <div id="response-panel" class="mt-6 min-h-[140px] flex flex-col items-center justify-center text-center p-4 rounded-lg bg-slate-950 border border-slate-800">
            <div id="system-ready-state">
                <div class="w-3 h-3 bg-emerald-500 rounded-full mx-auto mb-2 animate-ping"></div>
                <p class="text-slate-400 text-sm font-bold uppercase tracking-wider">Awaiting Credential Scan...</p>
                <p class="text-slate-600 text-xs mt-1">Align attendee QR code within the perimeter crosshairs.</p>
            </div>

            <!-- Access Granted View Layout (Hidden by Default) -->
            <div id="state-granted" class="hidden w-full">
                <div class="text-emerald-400 font-black text-xl tracking-widest mb-1">✓ ACCESS GRANTED</div>
                <div id="res-name" class="text-white text-lg font-bold">---</div>
                <div class="text-slate-400 text-xs mt-1">
                    <span id="res-role" class="border border-slate-700 px-2 py-0.5 rounded text-emerald-500 text-[10px] font-bold">ROLE</span> 
                    <span id="res-org" class="ml-1">ORGANIZATION</span>
                </div>
                <div id="res-uid" class="text-slate-600 text-[10px] mt-2 font-mono">UID: ---</div>
            </div>

            <!-- Security Alert / Compromised View Layout (Hidden by Default) -->
            <div id="state-denied" class="hidden w-full">
                <div class="text-rose-500 font-black text-xl tracking-widest animate-bounce mb-1">🪪 SECURITY ALERT</div>
                <div id="res-deny-message" class="text-rose-300 text-sm font-bold px-2">---</div>
                <div id="res-deny-name" class="text-white text-xs mt-2 border-t border-rose-950 pt-2">---</div>
            </div>
        </div>

        <!-- Action Controls -->
        <button id="reset-btn" class="w-full mt-4 bg-slate-800 hover:bg-slate-700 text-slate-200 text-xs font-bold py-3 px-4 rounded-lg tracking-wider border border-slate-700 transition active:scale-98 hidden">
            RESET SCANNER BUFFER
        </button>
    </main>

    <!-- System Footer Status -->
    <footer class="w-full max-w-md text-center text-[10px] text-slate-600 border-t border-slate-900 pt-4 mb-2">
        Digital Sentry v1.0.0 // Encryption Standard Active // Session Verified
    </footer>

    <!-- Verification Logic Architecture Scripts -->
    <script>
        // Paste exact deployed Google Apps Script Web App URL right here
        const DATABASE_API_URL = "https://script.google.com/macros/s/AKfycbxgmDq46BK4uerjj_CSWqmsLHpt0fSBgBnMluCQl_onZrklP0oY0m3wkGkUf7XBd69q2g/exec";

        const html5QrcodeScanner = new Html5Qrcode("reader");
        let isProcessingScan = false;

        // UI Target Nodes
        const readyState = document.getElementById('system-ready-state');
        const grantedState = document.getElementById('state-granted');
        const deniedState = document.getElementById('state-denied');
        const resetBtn = document.getElementById('reset-btn');

        // Text Injection Target Nodes
        const resName = document.getElementById('res-name');
        const resRole = document.getElementById('res-role');
        const resOrg = document.getElementById('res-org');
        const resUid = document.getElementById('res-uid');
        const resDenyMessage = document.getElementById('res-deny-message');
        const resDenyName = document.getElementById('res-deny-name');

        function onScanSuccess(decodedText, decodedResult) {
            if (isProcessingScan) return;
            isProcessingScan = true;

            try { new AudioContext().resume(); } catch(e){}

            readyState.innerHTML = `
                <div class="w-6 h-6 border-2 border-emerald-500 border-t-transparent rounded-full animate-spin mx-auto mb-2"></div>
                <p class="text-emerald-500 text-xs font-bold tracking-widest uppercase">Querying Central Registry Backend...</p>
            `;

            // EXTREMELY RELIABLE: Read the clean, raw UID directly from the matrix data stream
            const ticketUID = decodedText.trim();

            if (!ticketUID) {
                showSystemFailure("INVALID FORMAT", "The scanned asset contains no authorized signature.");
                return;
            }

            // Fire verification request package out to the Google Sheets database endpoint API
            // Fire verification packet out using a simple request to bypass CORS preflight blocks
            fetch(DATABASE_API_URL, {
                method: "POST",
                mode: "cors", 
                // We use text/plain content type intentionally to bypass the preflight CORS security check.
                // Google Apps Script reads the string contents cleanly inside e.postData.contents.
                headers: { "Content-Type": "text/plain" },
                body: JSON.stringify({ action: "verify", uid: ticketUID })
            })
            .then(response => response.json())
            .then(data => {
                resetBtn.classList.remove('hidden');
                readyState.classList.add('hidden');

                if (data.status === "granted") {
                    resName.textContent = data.name;
                    resRole.textContent = data.role.toUpperCase();
                    resOrg.textContent = data.org.toUpperCase();
                    resUid.textContent = `UID: ${ticketUID}`;
                    
                    grantedState.classList.remove('hidden');
                    document.getElementById('response-panel').className = "mt-6 min-h-[140px] flex flex-col items-center justify-center text-center p-4 rounded-lg bg-emerald-950/20 border border-emerald-500/40";
                } 
                else if (data.status === "compromised" || data.status === "invalid") {
                    resDenyMessage.textContent = data.message;
                    resDenyName.textContent = data.name ? `ASSIGNED TO: ${data.name}` : "UNAUTHORIZED SIGNATURE";
                    
                    deniedState.classList.remove('hidden');
                    document.getElementById('response-panel').className = "mt-6 min-h-[140px] flex flex-col items-center justify-center text-center p-4 rounded-lg bg-rose-950/20 border border-rose-500/40";
                }
            })
            .catch(error => {
                console.error(error);
                showSystemFailure("NETWORK TIMEOUT", "Database lookup handshake failed.");
            });
        }

        function showSystemFailure(title, msg) {
            resetBtn.classList.remove('hidden');
            readyState.classList.add('hidden');
            resDenyMessage.textContent = `${title}: ${msg}`;
            resDenyName.textContent = "CORE SYSTEM REJECTION";
            deniedState.classList.remove('hidden');
            document.getElementById('response-panel').className = "mt-6 min-h-[140px] flex flex-col items-center justify-center text-center p-4 rounded-lg bg-rose-950/20 border border-rose-500/40";
        }

        // Reset system view states to ready scanner for the next attendee in line
        resetBtn.addEventListener('click', () => {
            isProcessingScan = false;
            resetBtn.classList.add('hidden');
            grantedState.classList.add('hidden');
            deniedState.classList.add('hidden');
            
            document.getElementById('response-panel').className = "mt-6 min-h-[140px] flex flex-col items-center justify-center text-center p-4 rounded-lg bg-slate-950 border border-slate-800";
            
            readyState.innerHTML = `
                <div class="w-3 h-3 bg-emerald-500 rounded-full mx-auto mb-2 animate-ping"></div>
                <p class="text-slate-400 text-sm font-bold uppercase tracking-wider">Awaiting Credential Scan...</p>
                <p class="text-slate-600 text-xs mt-1">Align attendee QR code within the perimeter crosshairs.</p>
            `;
            readyState.classList.remove('hidden');
        });

        // Initialize and fire up the device back-facing video stream camera array
        html5QrcodeScanner.start(
            { facingMode: "environment" }, 
            { fps: 10, qrbox: (width, height) => ({ width: width * 0.8, height: height * 0.8 }) },
            onScanSuccess
        ).catch(err => {
            readyState.innerHTML = `<p class="text-rose-500 text-xs font-bold">CAMERA INITIALIZATION FAILURE: Please authorize video permissions.</p>`;
        });
        // Progressive Web App service script registration entry point 
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                    .then(reg => console.log('Digital Sentry Service Worker Registered Success.'))
                    .catch(err => console.error('Service worker registration failed:', err));
            });
        }
    </script>
</body>
</html>
